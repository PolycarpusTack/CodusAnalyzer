name: Detection Benchmark

on:
  pull_request:
    paths:
      - 'src/lib/analysis/**'
      - 'src/lib/static-analysis.ts'
      - 'benchmarks/**'

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run benchmarks
        run: npx tsx benchmarks/runner.ts --json > benchmarks/results/latest.json

      - name: Generate report
        run: npx tsx benchmarks/reporter.ts benchmarks/results/latest.json

      - name: Check for regressions
        run: npx tsx benchmarks/runner.ts

      - name: Post report as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'benchmarks/results/report.md';
            if (fs.existsSync(reportPath)) {
              const report = fs.readFileSync(reportPath, 'utf-8');
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: report,
              });
            }
